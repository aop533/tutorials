<!doctype html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aop533 教學文件</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div class="header">
        <div style="max-width:860px;margin:0 auto;">
            <h1>📚 教學文件</h1>
            <p>aop533 整理的開發教學，持續更新中</p>
        </div>
    </div>
    <div class="container" id="app">
        <!-- 分類區塊 template -->
        <template data-template="category">
            <div class="category">
                <div class="category-title"></div>
                <div class="cards"></div>
            </div>
        </template>
        <!-- 卡片 template：done / soon 兩個變體 -->
        <template data-template="item">
            <!-- 已完成：可點擊的 <a> -->
            <a class="card" href="#" data-card="done">
                <div class="icon" data-bind="icon"></div>
                <div class="name" data-bind="name"></div>
                <div class="desc" data-bind="desc"></div>
                <span class="badge badge-done">✓ 已完成</span>
            </a>
            <!-- 即將推出：不可點擊的 <div> -->
            <div class="card coming" data-card="soon">
                <div class="icon" data-bind="icon"></div>
                <div class="name" data-bind="name"></div>
                <div class="desc" data-bind="desc"></div>
                <span class="badge badge-soon">即將推出</span>
            </div>
        </template>
    </div>
    <div class="footer">aop533.github.io · 持續更新中</div>
    <script type="module">
        import App from './js/app.js'; new App(document.querySelector('#app')).render({ categories: 'config/categories.json', items: 'config/items.json', config: 'config/config.json', });
    </script>
</body>

</html>
